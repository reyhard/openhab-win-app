name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  direct-tests:
    name: Test + Build Gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Restore
        run: dotnet restore OpenHab.Windows.sln

      - name: Test Core
        run: dotnet test tests\OpenHab.Core.Tests\OpenHab.Core.Tests.csproj --no-restore

      - name: Test Sitemaps
        run: dotnet test tests\OpenHab.Sitemaps.Tests\OpenHab.Sitemaps.Tests.csproj --no-restore

      - name: Test Rendering
        run: dotnet test tests\OpenHab.Rendering.Tests\OpenHab.Rendering.Tests.csproj --no-restore

      - name: Test App
        run: dotnet test tests\OpenHab.App.Tests\OpenHab.App.Tests.csproj --no-restore

      - name: Build tray project
        run: dotnet build src\OpenHab.Windows.Tray\OpenHab.Windows.Tray.csproj --configuration Release --no-restore

  package-validation:
    name: Package Validation (MSIX)
    runs-on: windows-latest
    needs: direct-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Decode signing certificate
        shell: pwsh
        env:
          MSIX_CERT_BASE64: ${{ secrets.MSIX_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MSIX_CERT_BASE64)) {
            throw "Missing required secret: MSIX_CERT_BASE64"
          }

          $certPath = Join-Path $env:RUNNER_TEMP "openhab-signing.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:MSIX_CERT_BASE64))
          "MSIX_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build signed package (Release/x64)
        shell: pwsh
        env:
          MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
        run: |
          $args = @(
            "-Configuration", "Release",
            "-Platform", "x64",
            "-PackageCertificateKeyFile", $env:MSIX_CERT_PATH
          )

          if (-not [string]::IsNullOrWhiteSpace($env:MSIX_CERT_PASSWORD)) {
            $args += @("-PackageCertificatePassword", $env:MSIX_CERT_PASSWORD)
          }

          .\build-package.ps1 @args

      - name: Upload MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: msix-package
          path: |
            src/OpenHab.Windows.Package/AppPackages/**/*.msixbundle
            src/OpenHab.Windows.Package/AppPackages/**/*.msix
            src/OpenHab.Windows.Package/AppPackages/**/*.appinstaller
          if-no-files-found: error
