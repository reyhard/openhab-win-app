name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  direct-tests:
    name: Test + Build Gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Restore
        run: dotnet restore OpenHab.Windows.sln

      - name: Test Core
        run: dotnet test tests\OpenHab.Core.Tests\OpenHab.Core.Tests.csproj --no-restore

      - name: Test Sitemaps
        run: dotnet test tests\OpenHab.Sitemaps.Tests\OpenHab.Sitemaps.Tests.csproj --no-restore

      - name: Test Rendering
        run: dotnet test tests\OpenHab.Rendering.Tests\OpenHab.Rendering.Tests.csproj --no-restore

      - name: Test App
        run: dotnet test tests\OpenHab.App.Tests\OpenHab.App.Tests.csproj --no-restore

      - name: Build tray project
        run: dotnet build src\OpenHab.Windows.Tray\OpenHab.Windows.Tray.csproj --configuration Release --no-restore

  package-validation:
    name: Package Validation
    runs-on: windows-latest
    needs: direct-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Build package (Release/x64)
        shell: pwsh
        run: .\build-package.ps1 -Configuration Release -Platform x64
