name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "19 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: windows-latest
    timeout-minutes: 45
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force | Out-Null
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Restore
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $projects = @(
            "src\OpenHab.Windows.Tray\OpenHab.Windows.Tray.csproj",
            "tests\OpenHab.Core.Tests\OpenHab.Core.Tests.csproj",
            "tests\OpenHab.Sitemaps.Tests\OpenHab.Sitemaps.Tests.csproj",
            "tests\OpenHab.Rendering.Tests\OpenHab.Rendering.Tests.csproj",
            "tests\OpenHab.App.Tests\OpenHab.App.Tests.csproj"
          )

          foreach ($project in $projects) {
            dotnet restore $project
          }

      - name: Build and analyze
        shell: pwsh
        env:
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # coverage.runsettings controls generated OpenCover reports; sonar.coverage.exclusions controls Sonar coverage analysis scope.
        # WinUI code-behind/control factories are also excluded from CPD because shared behavior is extracted and tested in neutral layers.
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          if ([string]::IsNullOrWhiteSpace($env:SONAR_ORGANIZATION)) {
            throw "Missing required repository variable: SONAR_ORGANIZATION"
          }

          if ([string]::IsNullOrWhiteSpace($env:SONAR_PROJECT_KEY)) {
            throw "Missing required repository variable: SONAR_PROJECT_KEY"
          }

          if ([string]::IsNullOrWhiteSpace($env:SONAR_TOKEN)) {
            throw "Missing required repository secret: SONAR_TOKEN"
          }

          Write-Host "Sonar organization: $env:SONAR_ORGANIZATION"
          Write-Host "Sonar project key: $env:SONAR_PROJECT_KEY"

          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"$env:SONAR_PROJECT_KEY" `
            /o:"$env:SONAR_ORGANIZATION" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml" `
            /d:sonar.coverage.exclusions="src/OpenHab.Windows.Tray/App.xaml.cs,src/OpenHab.Windows.Tray/AcrylicBlurHelper.cs,src/OpenHab.Windows.Tray/DwmWindowDecorations.cs,src/OpenHab.Windows.Tray/FlyoutWindow.xaml.cs,src/OpenHab.Windows.Tray/MainWindow.xaml.cs,src/OpenHab.Windows.Tray/MainUi/MainUiWebViewHost.xaml.cs,src/OpenHab.Windows.Tray/Notifications/NotificationsPageControl.xaml.cs,src/OpenHab.Windows.Tray/Rendering/OpenHabIconImageSourceLoader.cs,src/OpenHab.Windows.Tray/Rendering/CompositionAnimationHelper.cs,src/OpenHab.Windows.Tray/Rendering/SitemapComboHelper.cs,src/OpenHab.Windows.Tray/Rendering/SitemapControlFactory.cs,src/OpenHab.Windows.Tray/Rendering/SitemapPageTransitionAnimator.cs,src/OpenHab.Windows.Tray/Rendering/SitemapSurface/SitemapIconAuthResolver.cs,src/OpenHab.Windows.Tray/Rendering/SitemapSurface/SitemapSurfaceRenderer.cs,src/OpenHab.Windows.Tray/Settings/SettingsPageControl.xaml.cs,src/OpenHab.Windows.Tray/Shortcuts/GlobalHotkeyService.cs,src/OpenHab.Windows.Tray/Shortcuts/HotkeyMessageWindow.cs,src/OpenHab.Windows.Tray/Shortcuts/RadialCommandMenuWindow.cs,src/OpenHab.Windows.Tray/Shortcuts/ShortcutInteractiveCommandWindow.cs,src/OpenHab.Windows.Tray/Shortcuts/ShortcutRecorderControl.cs,src/OpenHab.Windows.Tray/Shortcuts/ShortcutSettingsControls.cs,src/OpenHab.Windows.Tray/Tray/TrayIconService.cs,src/OpenHab.Windows.Tray/Tray/TrayFlyoutPositioner.cs,src/OpenHab.Windows.Tray/Startup/StartupManager.cs,src/OpenHab.Windows.Tray/DeviceInfo/WindowsBatteryInfoReader.cs,src/OpenHab.Windows.Tray/DeviceInfo/WindowsBluetoothInfoReader.cs,src/OpenHab.Windows.Tray/DeviceInfo/WindowsNetworkInfoReader.cs,src/OpenHab.Windows.Tray/DeviceInfo/WindowsSessionInfoReader.cs,src/OpenHab.Windows.Tray/DeviceInfo/WindowsDeviceStateSnapshotSource.cs,src/OpenHab.Windows.Notifications/ShortcutRegistrar.cs,src/OpenHab.Windows.Notifications/ToastService.cs,src/OpenHab.Core/Auth/WindowsCredentialStore.cs" `
            /d:sonar.cpd.exclusions="src/OpenHab.Windows.Tray/FlyoutWindow.xaml.cs,src/OpenHab.Windows.Tray/MainWindow.xaml.cs,src/OpenHab.Windows.Tray/Rendering/SitemapControlFactory.cs" `
            /d:sonar.qualitygate.wait=true

          dotnet build src\OpenHab.Windows.Tray\OpenHab.Windows.Tray.csproj --configuration Release --no-restore --no-incremental

          $testProjects = @(
            "tests\OpenHab.Core.Tests\OpenHab.Core.Tests.csproj",
            "tests\OpenHab.Sitemaps.Tests\OpenHab.Sitemaps.Tests.csproj",
            "tests\OpenHab.Rendering.Tests\OpenHab.Rendering.Tests.csproj",
            "tests\OpenHab.App.Tests\OpenHab.App.Tests.csproj"
          )

          foreach ($testProject in $testProjects) {
            dotnet test $testProject `
              --configuration Release `
              --no-restore `
              --collect "XPlat Code Coverage" `
              --settings coverage.runsettings `
              --results-directory TestResults
          }

          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
