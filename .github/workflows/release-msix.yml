name: Release MSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.0)"
        required: true
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-msix-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release-msix:
    name: Build and Release MSIX Zip
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Decode signing certificate
        shell: pwsh
        env:
          MSIX_CERT_BASE64: ${{ secrets.MSIX_CERT_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MSIX_CERT_BASE64)) {
            throw "Missing required secret: MSIX_CERT_BASE64"
          }

          $certPath = Join-Path $env:RUNNER_TEMP "openhab-signing.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:MSIX_CERT_BASE64))
          "MSIX_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore OpenHab.Windows.sln

      - name: Build signed package and export CER
        shell: pwsh
        env:
          MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
        run: |
          $buildPackageParams = @{
            Configuration = "Release"
            Platform = "x64"
            PackageCertificateKeyFile = $env:MSIX_CERT_PATH
            ExportCertificate = $true
          }

          if (-not [string]::IsNullOrWhiteSpace($env:MSIX_CERT_PASSWORD)) {
            $buildPackageParams.PackageCertificatePassword = $env:MSIX_CERT_PASSWORD
          }

          .\build-package.ps1 @buildPackageParams

      - name: Create release zip
        id: package
        shell: pwsh
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
          RELEASE_REF_NAME: ${{ github.ref_name }}
        run: |
          $tag = if ($env:RELEASE_EVENT_NAME -eq "workflow_dispatch") { $env:RELEASE_INPUT_TAG } else { $env:RELEASE_REF_NAME }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Could not determine release tag."
          }
          if ($tag -notmatch '^v[0-9A-Za-z][0-9A-Za-z._-]*$') {
            throw "Release tag must start with 'v' and contain only letters, numbers, dots, underscores, or hyphens."
          }

          $packageRoot = Join-Path $PWD "src\OpenHab.Windows.Package\AppPackages"
          $msixBundle = Get-ChildItem -Path $packageRoot -Filter *.msixbundle -Recurse -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $msixBundle) {
            throw "No .msixbundle found under $packageRoot"
          }

          $cer = Get-ChildItem -Path $packageRoot -Filter *.cer -Recurse -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $cer) {
            throw "No .cer found under $packageRoot"
          }

          $outputDir = Join-Path $env:RUNNER_TEMP "release"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $zipName = "openhab-win-app-$tag-msix.zip"
          $zipPath = Join-Path $outputDir $zipName
          Compress-Archive -Path @($msixBundle.FullName, $cer.FullName) -DestinationPath $zipPath -Force

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_path }}
